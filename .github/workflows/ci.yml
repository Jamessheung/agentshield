name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --release

      - name: Run tests
        run: cargo test --workspace

      - name: Integration test — malicious skill
        run: |
          output=$(cargo run --bin agentshield -- scan tests/fixtures/malicious/clawhavoc-sample/ --format json || true)
          score=$(echo "$output" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
          if [ "$score" -lt 50 ]; then
            echo "FAIL: ClawHavoc sample scored $score, expected >= 50"
            exit 1
          fi
          echo "PASS: ClawHavoc sample scored $score"

      - name: Integration test — clean skill
        run: |
          output=$(cargo run --bin agentshield -- scan tests/fixtures/clean/weather-skill/ --format json)
          score=$(echo "$output" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
          if [ "$score" -gt 0 ]; then
            echo "FAIL: Clean skill scored $score, expected 0"
            exit 1
          fi
          echo "PASS: Clean skill scored $score"

  typescript:
    name: TypeScript Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd cli && npm ci

      - name: Build
        run: cd cli && npm run build

      - name: Run unit tests
        run: cd cli && npm test

      - name: Integration test — malicious skill
        run: |
          output=$(node cli/dist/index.js scan tests/fixtures/malicious/clawhavoc-sample/ -f json || true)
          score=$(echo "$output" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
          if [ "$score" -lt 50 ]; then
            echo "FAIL: ClawHavoc sample scored $score, expected >= 50"
            exit 1
          fi
          echo "PASS: ClawHavoc sample scored $score"

      - name: Integration test — clean skill
        run: |
          output=$(node cli/dist/index.js scan tests/fixtures/clean/weather-skill/ -f json)
          score=$(echo "$output" | grep -o '"score":[0-9]*' | head -1 | cut -d: -f2)
          if [ "$score" -gt 0 ]; then
            echo "FAIL: Clean skill scored $score, expected 0"
            exit 1
          fi
          echo "PASS: Clean skill scored $score"
